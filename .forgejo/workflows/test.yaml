name: Test Quarkus Backend

on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.mvn/**'
      - 'mvnw'
      - '.forgejo/workflows/test.yaml'

jobs:
  build:
    runs-on: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Maven
        uses: https://github.com/stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.10

      - name: Run maven test
        run: mvn clean test -fae

      - name: Run maven package
        run: mvn package -Dquarkus.container-image.build=false -Dquarkus.container-image.push=false
